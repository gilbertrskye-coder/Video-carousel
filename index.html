<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Module</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #9644ed;
    --accent-hover: #7b28d8;
    --accent-dim: rgba(150,68,237,0.18);
    --accent-glow: rgba(150,68,237,0.40);
    --black: #07061a;
    --white: #ffffff;
    --white-80: rgba(255,255,255,0.80);
    --white-55: rgba(255,255,255,0.55);
    --white-20: rgba(255,255,255,0.20);
    --white-10: rgba(255,255,255,0.10);
    --white-06: rgba(255,255,255,0.06);
    --overlay: rgba(6,3,20,0.35);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    font-family: 'Calibri', 'Carlito', 'Trebuchet MS', Arial, sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  .canvas {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bg-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #07061a 100%);
    z-index: 0;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 50%, rgba(150,68,237,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(150,68,237,0.05) 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(150,68,237,0.06) 0%, transparent 45%);
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: clamp(0.8rem, 3vh, 1.5rem) clamp(0.8rem, 3vw, 1.5rem);
    gap: clamp(0.6rem, 2vh, 1rem);
  }

  /* Progress Bar */
  .progress-bar-wrap {
    width: 100%;
    height: clamp(3px, 0.6vh, 5px);
    background: var(--white-10);
    border-radius: 100px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* Main Carousel Area - Netflix style: arrows overlay on video edges */
  .carousel-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    gap: 0;
  }

  /* Video Card - full width, arrows sit on top */
  .video-card {
    flex: 1;
    max-width: min(860px, 90vw);
    height: 100%;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--white-10);
    border-radius: clamp(10px, 2vw, 16px);
    background: var(--white-06);
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  .video-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(150,68,237,0.15), inset 0 0 20px rgba(150,68,237,0.05);
  }

  .video-card.visited {
    border-color: rgba(150,68,237,0.25);
  }

  /* Video Player Area */
  .video-player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }

  .video-player video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Video Overlay / Poster */
  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(7,6,26,0.3) 0%, rgba(7,6,26,0.7) 100%);
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .video-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .play-button {
    width: clamp(48px, 8vw, 72px);
    height: clamp(48px, 8vw, 72px);
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 16px rgba(150,68,237,0.4);
  }

  .play-button:hover {
    background: var(--accent-hover);
    transform: scale(1.08);
    box-shadow: 0 0 24px var(--accent-glow), 0 4px 16px rgba(150,68,237,0.5);
  }

  .play-button svg {
    width: 40%;
    height: 40%;
    fill: var(--white);
    margin-left: 4px;
  }

  .video-duration {
    position: absolute;
    bottom: clamp(8px, 1.5vh, 12px);
    right: clamp(8px, 1.5vw, 12px);
    background: rgba(7,6,26,0.85);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: clamp(0.55rem, 1.2vw, 0.68rem);
    color: var(--white-80);
    font-weight: 400;
  }

  /* Video Progress (custom) */
  .video-progress-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .video-player:hover .video-progress-wrap,
  .video-player.playing .video-progress-wrap {
    opacity: 1;
  }

  .video-progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
    transition: width 0.1s linear;
  }

  /* ============================================================
     NETFLIX-STYLE NAVIGATION ARROWS - Overlay on video edges
     ============================================================ */
  .nav-arrow-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    width: clamp(44px, 7vw, 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--white);
    background: transparent;
    border: none;
    z-index: 10;
    transition: background 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .video-player:hover .nav-arrow-overlay,
  .nav-arrow-overlay:focus-visible {
    opacity: 1;
  }

  .nav-arrow-overlay:hover {
    background: rgba(7, 6, 26, 0.4);
  }

  .nav-arrow-overlay:disabled {
    opacity: 0 !important;
    cursor: not-allowed;
    pointer-events: none;
  }

  .nav-arrow-overlay.prev {
    left: 0;
    border-radius: 10px 0 0 0;
  }

  .nav-arrow-overlay.next {
    right: 0;
    border-radius: 0 10px 0 0;
  }

  .nav-arrow-overlay svg {
    width: clamp(24px, 4vw, 36px);
    height: clamp(24px, 4vw, 36px);
    fill: currentColor;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.2s ease;
  }

  .nav-arrow-overlay:hover svg {
    transform: scale(1.15);
  }

  /* Thumbnail Strip */
  .thumbnail-strip {
    flex-shrink: 0;
    display: flex;
    gap: clamp(0.4rem, 1vw, 0.7rem);
    justify-content: center;
    padding: clamp(0.3rem, 1vh, 0.5rem) 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .thumbnail-strip::-webkit-scrollbar {
    display: none;
  }

  .thumbnail {
    flex-shrink: 0;
    width: clamp(56px, 10vw, 80px);
    aspect-ratio: 16 / 9;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    position: relative;
    background: var(--white-06);
    transition: all 0.3s ease;
  }

  .thumbnail:hover {
    border-color: rgba(150,68,237,0.4);
    transform: translateY(-2px);
  }

  .thumbnail.active {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(150,68,237,0.3);
  }

  .thumbnail.visited::after {
    content: '';
    position: absolute;
    top: 3px;
    right: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent-glow);
  }

  .thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }

  .thumbnail.active img,
  .thumbnail:hover img {
    opacity: 1;
  }

  .thumbnail-number {
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-size: clamp(0.5rem, 1vw, 0.65rem);
    font-weight: 600;
    color: var(--white);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Dot Indicators */
  .dot-indicators {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 2px 0;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--white-20);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .dot:hover {
    background: rgba(150,68,237,0.5);
  }

  .dot.active {
    background: var(--accent);
    width: 18px;
    border-radius: 100px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .dot.watched {
    background: rgba(150,68,237,0.5);
  }

  /* Footer */
  .footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: clamp(0.4rem, 1vh, 0.6rem);
    border-top: 1px solid var(--white-10);
  }

  .progress-text {
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-55);
    font-weight: 400;
  }

  .progress-text strong {
    color: var(--accent);
    font-weight: 600;
  }

  .completion-label {
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-55);
    font-weight: 400;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(7, 6, 26, 0.95);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-80);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 1000;
    max-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 12px rgba(150,68,237,0.2);
  }

  .tooltip.visible {
    opacity: 1;
  }

  /* ============================================================
     INSTRUCTION POPUP - TIGHT positioning, close to the button
     ============================================================ */
  .instruction-popup {
    position: absolute;
    background: rgba(7, 6, 26, 0.92);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: clamp(0.62rem, 1.4vw, 0.75rem);
    color: var(--white-80);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 50;
    max-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 16px rgba(150,68,237,0.2);
    line-height: 1.45;
    transform: scale(0.95);
  }

  .instruction-popup.visible {
    opacity: 1;
    transform: scale(1);
  }

  .instruction-popup strong {
    color: var(--white);
    font-weight: 600;
  }

  .instruction-popup kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--white-20);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85em;
    color: var(--accent);
    font-weight: 600;
  }

  /* Speech bubble pointer - CSS triangle, very close to target */
  .instruction-popup::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    border-style: solid;
  }

  /* Pointer pointing DOWN (popup is ABOVE the target) - tiny gap */
  .instruction-popup.pointer-down::after {
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 6px 5px 0 5px;
    border-color: var(--accent) transparent transparent transparent;
  }

  /* Pointer pointing UP (popup is BELOW the target) - tiny gap */
  .instruction-popup.pointer-up::after {
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 5px 6px 5px;
    border-color: transparent transparent var(--accent) transparent;
  }

  /* Pointer pointing LEFT (popup is to the RIGHT of the target) - tiny gap */
  .instruction-popup.pointer-left::after {
    left: -6px;
    top: 50%;
    transform: translateY(-50%);
    border-width: 5px 6px 5px 0;
    border-color: transparent var(--accent) transparent transparent;
  }

  /* Pointer pointing RIGHT (popup is to the LEFT of the target) - tiny gap */
  .instruction-popup.pointer-right::after {
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border-width: 5px 0 5px 6px;
    border-color: transparent transparent transparent var(--accent);
  }

  /* Responsive */
  @media (max-width: 640px) {
    .carousel-stage {
      flex-direction: column;
    }

    .nav-arrow-overlay {
      display: none;
    }

    .video-card {
      max-width: 100%;
      width: 100%;
    }

    .thumbnail-strip {
      order: -1;
      width: 100%;
      justify-content: flex-start;
      padding: 0.3rem 0;
    }
  }

  @media (max-width: 480px) {
    .content {
      padding: 0.6rem;
      gap: 0.5rem;
    }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
<base target="_blank">

<body>

<div class="canvas">
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="carousel-stage" id="carouselStage">
      <div class="video-card" id="videoCard">
        <div class="video-player" id="videoPlayer">
          <video id="mainVideo" preload="metadata" playsinline></video>

          <!-- Netflix-style overlay arrows on left/right edges -->
          <button class="nav-arrow-overlay prev" id="prevBtn" aria-label="Previous video">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <button class="nav-arrow-overlay next" id="nextBtn" aria-label="Next video">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </button>

          <div class="video-overlay" id="videoOverlay">
            <button class="play-button" id="playBtn" aria-label="Play video">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="video-duration" id="videoDuration">0:00</div>
          <div class="video-progress-wrap">
            <div class="video-progress-fill" id="videoProgressFill"></div>
          </div>
          <!-- Instruction popup lives INSIDE the video player -->
          <div class="instruction-popup" id="instructionPopup"></div>
        </div>
      </div>
    </div>

    <div class="thumbnail-strip" id="thumbnailStrip"></div>

    <div class="dot-indicators" id="dotIndicators"></div>

    <div class="footer">
      <span class="progress-text"><strong id="visitedCount">0</strong> / <span id="totalCount">0</span> watched</span>
      <span class="completion-label" id="completionLabel">Begin watching</span>
    </div>
  </div>
</div>

<!-- Standard Tooltip (fixed position for thumbnails) -->
<div class="tooltip" id="tooltip"></div>

<script>
  // ============================================================
  // CONFIGURATION
  // Set USE_DEMO = true for testing with sample videos
  // Set USE_DEMO = false and update paths below for your GitHub deployment
  // ============================================================
  const USE_DEMO = true;

  // Video Content Data - 2 videos only
  // Update videoUrl and posterUrl to your actual file paths for GitHub
  const VIDEOS = [
    {
      // GitHub Pages paths (relative to index.html):
      videoUrl: "./videos/vid-01.mp4",
      posterUrl: "./videos/vid-01.jpg",
      // Demo fallback URLs (used when USE_DEMO = true):
      demoVideoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
      demoPosterUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg",
      duration: "0:00"
    },
    {
      videoUrl: "./videos/vid-02.mp4",
      posterUrl: "./videos/vid-02.jpg",
      demoVideoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
      demoPosterUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ElephantsDream.jpg",
      duration: "0:00"
    }
  ];

  // Instruction messages that change based on user state and element hovered
  const INSTRUCTIONS = {
    playBtn: {
      start: "<strong>Click to play</strong> the video. Use <kbd>Space</kbd> to pause/resume.",
      playing: "<strong>Click to pause</strong> the video. Use <kbd>Space</kbd> to resume.",
      watched: "<strong>Rewatch</strong> this video anytime. Click to play again."
    },
    prevBtn: {
      default: "<strong>Previous video</strong>. Click or press <kbd>←</kbd> to go back.",
      disabled: "This is the first video."
    },
    nextBtn: {
      default: "<strong>Next video</strong>. Click or press <kbd>→</kbd> to continue.",
      oneWatched: "<strong>Next video</strong> — one more to watch! Click or press <kbd>→</kbd>.",
      allWatched: "<strong>Rewatch</strong> the next video. You've seen them all!",
      disabled: "This is the last video."
    }
  };

  // State
  const watched = new Set();
  let currentIndex = 0;
  let isPlaying = false;
  let watchThreshold = 0.7; // Mark as watched at 70% progress

  // DOM Elements
  const video = document.getElementById('mainVideo');
  const videoOverlay = document.getElementById('videoOverlay');
  const playBtn = document.getElementById('playBtn');
  const videoDuration = document.getElementById('videoDuration');
  const videoProgressFill = document.getElementById('videoProgressFill');
  const videoCard = document.getElementById('videoCard');
  const videoPlayer = document.getElementById('videoPlayer');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const thumbnailStrip = document.getElementById('thumbnailStrip');
  const dotIndicators = document.getElementById('dotIndicators');
  const progressBar = document.getElementById('progressBar');
  const visitedCountEl = document.getElementById('visitedCount');
  const totalCountEl = document.getElementById('totalCount');
  const completionLabel = document.getElementById('completionLabel');
  const tooltip = document.getElementById('tooltip');
  const instructionPopup = document.getElementById('instructionPopup');

  // Initialize
  totalCountEl.textContent = VIDEOS.length;

  // Helper: Get the correct URL based on USE_DEMO flag
  function getVideoUrl(item) {
    return USE_DEMO ? item.demoVideoUrl : item.videoUrl;
  }

  function getPosterUrl(item) {
    return USE_DEMO ? item.demoPosterUrl : item.posterUrl;
  }

  // ============================================================
  // INSTRUCTION POPUP - TIGHT positioning, very close to button
  // ============================================================

  function showInstructionPopup(element, htmlContent, position) {
    instructionPopup.innerHTML = htmlContent;
    instructionPopup.className = 'instruction-popup';
    instructionPopup.classList.add('visible');

    // Get video player bounds (the container we position inside)
    const playerRect = videoPlayer.getBoundingClientRect();
    const elementRect = element.getBoundingClientRect();

    // Calculate element position relative to the video player
    const elLeft = elementRect.left - playerRect.left;
    const elTop = elementRect.top - playerRect.top;
    const elRight = elementRect.right - playerRect.left;
    const elBottom = elementRect.bottom - playerRect.top;
    const elCenterX = elLeft + elementRect.width / 2;
    const elCenterY = elTop + elementRect.height / 2;

    const popupWidth = 220;
    const popupHeight = 50; // approximate
    const gap = 4; // VERY small gap - just 4px between popup and button
    const padding = 8;

    let left, top, pointerClass;

    if (position === 'playBtn') {
      // Play button: popup ABOVE the button, very close
      pointerClass = 'pointer-down';
      left = elCenterX - popupWidth / 2;
      top = elTop - popupHeight - gap;

      // If too close to top, put it BELOW the button
      if (top < padding) {
        top = elBottom + gap;
        pointerClass = 'pointer-up';
      }
      // Clamp horizontal
      left = Math.max(padding, Math.min(left, playerRect.width - popupWidth - padding));
    }
    else if (position === 'prevBtn') {
      // Previous button (left edge): popup to the RIGHT of the arrow, very close
      pointerClass = 'pointer-left';
      left = elRight + gap;
      top = elCenterY - popupHeight / 2;

      // If too far right, put it ABOVE the button
      if (left + popupWidth > playerRect.width - padding) {
        left = elCenterX - popupWidth / 2;
        top = elTop - popupHeight - gap;
        pointerClass = 'pointer-down';
      }
      // Clamp vertical
      top = Math.max(padding, Math.min(top, playerRect.height - popupHeight - padding));
      // Clamp horizontal
      left = Math.max(padding, Math.min(left, playerRect.width - popupWidth - padding));
    }
    else if (position === 'nextBtn') {
      // Next button (right edge): popup to the LEFT of the arrow, very close
      pointerClass = 'pointer-right';
      left = elLeft - popupWidth - gap;
      top = elCenterY - popupHeight / 2;

      // If too far left, put it ABOVE the button
      if (left < padding) {
        left = elCenterX - popupWidth / 2;
        top = elTop - popupHeight - gap;
        pointerClass = 'pointer-down';
      }
      // Clamp vertical
      top = Math.max(padding, Math.min(top, playerRect.height - popupHeight - padding));
      // Clamp horizontal
      left = Math.max(padding, Math.min(left, playerRect.width - popupWidth - padding));
    }

    // Apply position relative to video player
    instructionPopup.style.left = left + 'px';
    instructionPopup.style.top = top + 'px';
    instructionPopup.classList.add(pointerClass);
  }

  function hideInstructionPopup() {
    instructionPopup.classList.remove('visible');
  }

  // Get appropriate instruction message for play button
  function getPlayBtnInstruction() {
    if (watched.has(currentIndex)) {
      return INSTRUCTIONS.playBtn.watched;
    } else if (isPlaying) {
      return INSTRUCTIONS.playBtn.playing;
    } else {
      return INSTRUCTIONS.playBtn.start;
    }
  }

  // Get appropriate instruction message for next button
  function getNextBtnInstruction() {
    if (nextBtn.disabled) {
      return INSTRUCTIONS.nextBtn.disabled;
    }
    const count = watched.size;
    const total = VIDEOS.length;
    if (count === total) {
      return INSTRUCTIONS.nextBtn.allWatched;
    } else if (count === 1 && currentIndex === 0) {
      return INSTRUCTIONS.nextBtn.oneWatched;
    } else {
      return INSTRUCTIONS.nextBtn.default;
    }
  }

  // Get appropriate instruction message for prev button
  function getPrevBtnInstruction() {
    if (prevBtn.disabled) {
      return INSTRUCTIONS.prevBtn.disabled;
    }
    return INSTRUCTIONS.prevBtn.default;
  }

  // Attach instruction popups to interactive elements
  function attachInstructionPopups() {
    // Play Button - popup very close to button
    playBtn.addEventListener('mouseenter', () => {
      showInstructionPopup(playBtn, getPlayBtnInstruction(), 'playBtn');
    });
    playBtn.addEventListener('mouseleave', hideInstructionPopup);

    // Previous Button (overlay arrow) - popup very close
    prevBtn.addEventListener('mouseenter', () => {
      showInstructionPopup(prevBtn, getPrevBtnInstruction(), 'prevBtn');
    });
    prevBtn.addEventListener('mouseleave', hideInstructionPopup);

    // Next Button (overlay arrow) - popup very close
    nextBtn.addEventListener('mouseenter', () => {
      showInstructionPopup(nextBtn, getNextBtnInstruction(), 'nextBtn');
    });
    nextBtn.addEventListener('mouseleave', hideInstructionPopup);
  }

  // Generate Thumbnails & Dots
  VIDEOS.forEach((item, index) => {
    const poster = getPosterUrl(item);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumbnail';
    thumb.dataset.index = index;
    thumb.innerHTML = `
      <img src="${poster}" alt="Video ${index + 1}" loading="lazy">
      <span class="thumbnail-number">${String(index + 1).padStart(2, '0')}</span>
    `;
    thumb.addEventListener('click', () => goToSlide(index));
    thumb.addEventListener('mouseenter', (e) => {
      const status = watched.has(index) ? ' (watched)' : ' (unwatched)';
      showTooltip(e, `Video ${index + 1}${status}`);
    });
    thumb.addEventListener('mouseleave', hideTooltip);
    thumbnailStrip.appendChild(thumb);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.index = index;
    dot.addEventListener('click', () => goToSlide(index));
    dotIndicators.appendChild(dot);
  });

  // Load Video
  function loadVideo(index) {
    const item = VIDEOS[index];

    // Pause current
    video.pause();
    isPlaying = false;
    videoOverlay.classList.remove('hidden');

    // Set new source
    video.src = getVideoUrl(item);
    video.poster = getPosterUrl(item);
    video.load();

    // Update duration display
    videoDuration.textContent = item.duration;

    // Update states
    updateCardState(index);
    updateThumbnails();
    updateDots();
    updateNavButtons();

    // Reset progress
    videoProgressFill.style.width = '0%';
  }

  // Update Card Visual State
  function updateCardState(index) {
    videoCard.classList.remove('active', 'visited');

    if (watched.has(index)) {
      videoCard.classList.add('visited');
    }

    videoCard.classList.add('active');
  }

  // Update Thumbnails
  function updateThumbnails() {
    const thumbs = thumbnailStrip.querySelectorAll('.thumbnail');
    thumbs.forEach((thumb, i) => {
      thumb.classList.remove('active', 'visited');
      if (i === currentIndex) thumb.classList.add('active');
      if (watched.has(i)) thumb.classList.add('visited');
    });
  }

  // Update Dots
  function updateDots() {
    const dots = dotIndicators.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
      dot.classList.remove('active', 'watched');
      if (i === currentIndex) dot.classList.add('active');
      if (watched.has(i)) dot.classList.add('watched');
    });
  }

  // Update Nav Buttons
  function updateNavButtons() {
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === VIDEOS.length - 1;
  }

  // Navigation
  function goToSlide(index) {
    if (index < 0 || index >= VIDEOS.length) return;
    currentIndex = index;
    loadVideo(currentIndex);
  }

  function nextSlide() {
    goToSlide(currentIndex + 1);
  }

  function prevSlide() {
    goToSlide(currentIndex - 1);
  }

  // Play/Pause
  function togglePlay() {
    if (video.paused) {
      video.play();
      isPlaying = true;
      videoOverlay.classList.add('hidden');
    } else {
      video.pause();
      isPlaying = false;
      videoOverlay.classList.remove('hidden');
    }
  }

  // Mark as Watched
  function markWatched() {
    if (!watched.has(currentIndex)) {
      watched.add(currentIndex);
      updateCardState(currentIndex);
      updateThumbnails();
      updateDots();
      updateProgress();
      updateCompletionLabel();
    }
  }

  // Update Progress
  function updateProgress() {
    const percentage = (watched.size / VIDEOS.length) * 100;
    progressBar.style.width = percentage + '%';
    visitedCountEl.textContent = watched.size;
  }

  // Update Completion Label
  function updateCompletionLabel() {
    const count = watched.size;
    const total = VIDEOS.length;

    if (count === 0) {
      completionLabel.textContent = 'Begin watching';
    } else if (count === total) {
      completionLabel.textContent = 'All videos watched!';
      completionLabel.style.color = 'var(--accent)';
    } else {
      completionLabel.textContent = `${total - count} video${total - count !== 1 ? 's' : ''} remaining`;
    }
  }

  // Video Event Listeners
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      const progress = (video.currentTime / video.duration) * 100;
      videoProgressFill.style.width = progress + '%';

      // Update duration display from actual video metadata
      const mins = Math.floor(video.duration / 60);
      const secs = Math.floor(video.duration % 60);
      videoDuration.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

      // Mark as watched at threshold
      if (video.currentTime / video.duration >= watchThreshold) {
        markWatched();
      }
    }
  });

  video.addEventListener('ended', () => {
    markWatched();
    isPlaying = false;
    videoOverlay.classList.remove('hidden');
  });

  video.addEventListener('click', togglePlay);
  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePlay();
  });

  // Navigation Events
  prevBtn.addEventListener('click', prevSlide);
  nextBtn.addEventListener('click', nextSlide);

  // Keyboard Navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') prevSlide();
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === ' ' || e.key === 'k') {
      e.preventDefault();
      togglePlay();
    }
  });

  // Touch/Swipe Support
  let touchStartX = 0;
  let touchEndX = 0;

  videoCard.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  videoCard.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, { passive: true });

  function handleSwipe() {
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) nextSlide();
      else prevSlide();
    }
  }

  // Tooltip Functions
  function showTooltip(e, text) {
    tooltip.textContent = text;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
  }

  // Initialize first slide and attach popups
  loadVideo(0);
  attachInstructionPopups();
</script>

</body>
</html>
